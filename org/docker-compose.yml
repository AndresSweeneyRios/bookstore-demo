x-common-build: &common-build
  context: .
  dockerfile: Dockerfile
  args:
    POSTGRES_USER: ${POSTGRES_USER}
    POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    POSTGRES_DB: ${POSTGRES_DB}
    EXPRESS_PORT: ${EXPRESS_PORT}

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always
    ports: 
      - "5432:5432"

  backend:
    environment:
      NODE_ENV: production
      EXPRESS_PORT: ${EXPRESS_PORT}
      EXPRESS_HOSTNAME: ${EXPRESS_HOSTNAME}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      ARGON2_SECRET: ${ARGON2_SECRET}
      PUBLIC_KEY: ${PUBLIC_KEY}
      PRIVATE_KEY: ${PRIVATE_KEY}
    build:
      <<: *common-build
      target: run-backend
    ports:
      - "${EXPRESS_PORT}:${EXPRESS_PORT}"
    restart: always
    depends_on:
      - postgres

  frontend:
    build:
      <<: *common-build
      target: run-frontend
    ports:
      - "${NGINX_PORT}:80"
    restart: always
    depends_on:
      - postgres
  
volumes:
  postgres_data: